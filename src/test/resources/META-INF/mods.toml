# 外部モジュールアクセス拒否の検証用プローブMod (ft_probe)。
# 本体(forbidden_things)とは別のJPMSモジュールとして dev 実行に載せ、
# 内部クラスへのアクセスが拒否されることを検証する。dev専用。
modLoader = "javafml"
loaderVersion = "[47,)"
license = "MIT"

[[mods]]
modId = "ft_probe"
version = "0.0.0"
displayName = "Forbidden Things Access-Denial Probe"
description = '''外部Modを模し、Forbidden Things 内部クラスへのアクセス拒否を検証するテスト用Mod。'''

# 本体より後にロードさせ、隔離適用済みの状態で検証する。
[[dependencies.ft_probe]]
modId = "forbidden_things"
mandatory = true
versionRange = "[0,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.ft_probe]]
modId = "forge"
mandatory = true
versionRange = "[47,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.ft_probe]]
modId = "minecraft"
mandatory = true
versionRange = "[1.20.1,1.21)"
ordering = "NONE"
side = "BOTH"
