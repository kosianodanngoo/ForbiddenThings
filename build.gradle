buildscript {
    repositories {
        maven { url = 'https://repo.spongepowered.org/repository/maven-public/' }
        mavenCentral()
    }
    dependencies {
        classpath 'org.spongepowered:mixingradle:0.7-SNAPSHOT'
    }
}

plugins {
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '[6.0.16,6.2)'
}

apply plugin: 'org.spongepowered.mixin'

group = mod_group_id
version = mod_version


base {
    archivesName = mod_jar_name
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(17)
}

// 外部モジュールアクセス拒否テスト用フラグ。`./gradlew accessDenialTest` 起動時、または明示的に
// `-PftProbeSelftest` を付けたときだけ true。これが true のとき server run にプローブの自己終了フラグを渡す。
def ftProbeSelfTest = project.hasProperty('ftProbeSelftest') ||
        gradle.startParameter.taskNames.any { it == 'accessDenialTest' || it == ':accessDenialTest' }
// プローブの検証結果ファイル。存在＝プローブが実際に走った証拠、内容(PASS/FAIL)＝合否。
// これで「起動時クラッシュ(既知の間欠レース)＝ファイル無し」と「LEAK検出＝FAIL」を区別する。
def ftProbeResultFile = layout.buildDirectory.file('ft-probe-result.txt').get().asFile

minecraft {
    mappings channel: mapping_channel, version: mapping_version

    copyIdeResources = true

    accessTransformer file('src/main/resources/META-INF/accesstransformer.cfg')

    runs {
        configureEach {
            workingDirectory project.file('run')

            property 'forge.logging.markers', 'REGISTRIES'


            property 'forge.logging.console.level', 'debug'

            jvmArg '-Djdk.attach.allowAttachSelf=true'

            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
                // 外部Mod役の検証用プローブ。独立したJPMSモジュールとして解決されるため、
                // applyModuleSetting() のアクセス拒否が外部Modと同様に適用される。
                // accessDenialTest 実行時（または -PftProbeSelftest 指定時）のみ読み込む。
                // これを付けないと runClient など通常の run にもプローブが混入してしまう。
                if (ftProbeSelfTest) {
                    "ft_probe" {
                        source sourceSets.test
                    }
                }
            }
        }

        client {
            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            property 'forge.enabledGameTestNamespaces', mod_id
        }

        server {
            property 'forge.enabledGameTestNamespaces', mod_id
            args '--nogui'
            // accessDenialTest 実行時（または -PftProbeSelftest 指定時）のみ、プローブ(FtAccessProbe)へ
            // 自己終了フラグと結果ファイルパスを渡す。プローブは FMLCommonSetup で検証し、結果ファイルへ
            // PASS/FAIL を書いてから exit する。合否判定は終了コードではなく結果ファイルで行う（下の accessDenialTest）。
            if (ftProbeSelfTest) {
                property 'ft.probe.selftest', 'true'
                property 'ft.probe.resultFile', ftProbeResultFile.absolutePath
            }
        }

        gameTestServer {
            property 'forge.enabledGameTestNamespaces', mod_id
        }

        data {
            workingDirectory project.file('run-data')

            args '--mod', mod_id, '--all', '--output', file('src/generated/resources/'), '--existing', file('src/main/resources/')
        }
    }
}

mixin {
    add sourceSets.main, "${mod_id}.refmap.json"

    config "${mod_id}.mixins.json"
}

sourceSets.main.resources { srcDir 'src/generated/resources' }

// 検証用プローブ(ft_probe, src/test)を Forge / 本体クラスに対してコンパイルできるようにする。
// dev 実行時のモジュール分離は build.gradle の runs{ mods{} } が制御するため、ここでクラスパスを
// 共有してもプローブは独立モジュール(ft_probe)として隔離対象になる。
sourceSets.test.compileClasspath += sourceSets.main.compileClasspath + sourceSets.main.output

repositories {
    maven{
        url = "https://cursemaven.com"
    }

    maven {
        url = "https://maven.theillusivec4.top/"
    }

    ivy {
        name = "L2Hostility-libs"
        url = "https://raw.githubusercontent.com/Minecraft-LightLand/L2Hostility/main/libs/"
        patternLayout {
            artifact "[artifact]-[revision].jar"
        }
        metadataSources { artifact() }
        content {
            includeModule("dev.xkmc.l2damagetracker", "l2damagetracker")
            includeModule("com.tterrag.registrate", "Registrate-MC1.20")
        }
    }
}

dependencies {
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"

    runtimeOnly fg.deobf("curse.maven:the-trial-monolith-1462850:8424931")

    compileOnly fg.deobf("top.theillusivec4.curios:curios-forge:5.4.0+1.20.1:api")
    runtimeOnly fg.deobf("top.theillusivec4.curios:curios-forge:5.4.0+1.20.1")

    compileOnly fg.deobf("com.tterrag.registrate:Registrate-MC1.20:1.3.11")
    compileOnly fg.deobf("dev.xkmc.l2damagetracker:l2damagetracker:0.4.3")
    compileOnly fg.deobf("curse.maven:l2hostility-909207:7815389")
    compileOnly fg.deobf("curse.maven:l2complements-758349:7606338")
    compileOnly fg.deobf("curse.maven:l2library-620203:6806000")
    compileOnly fg.deobf("curse.maven:patchouli-306770:7731017")

    runtimeOnly fg.deobf("curse.maven:l2hostility-909207:7815389")
    runtimeOnly fg.deobf("curse.maven:l2complements-758349:7606338")
    runtimeOnly fg.deobf("curse.maven:l2library-620203:6806000")
    runtimeOnly fg.deobf("curse.maven:patchouli-306770:7731017")
    runtimeOnly fg.deobf("com.tterrag.registrate:Registrate-MC1.20:1.3.11")

    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'
}

tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [minecraft_version   : minecraft_version, minecraft_version_range: minecraft_version_range,
                             forge_version       : forge_version, forge_version_range: forge_version_range,
                             loader_version_range: loader_version_range,
                             mod_id              : mod_id, mod_name: mod_name, mod_license: mod_license, mod_version: mod_version,
                             mod_authors         : mod_authors, mod_description: mod_description,]

    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml', 'pack.mcmeta']) {
        expand replaceProperties + [project: project]
    }
}

tasks.named('jar', Jar).configure {
    manifest {
        attributes(["Specification-Title"     : mod_id,
                    "Specification-Vendor"    : mod_authors,
                    "Specification-Version"   : "1", // We are version 1 of ourselves
                    "Implementation-Title"    : project.name,
                    "Implementation-Version"  : project.jar.archiveVersion,
                    "Implementation-Vendor"   : mod_authors,
                    "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
                    "Manifest-Version": "1.0",
                    "Agent-Class": "io.github.kosianodangoo.forbiddenthings.agent.ForbiddenAgent",
                    "Premain-Class": "io.github.kosianodangoo.forbiddenthings.agent.ForbiddenAgent",
                    "Can-Retransform-Classes": true,
                    "Can-Redefine-Classes": true])
    }

    finalizedBy 'reobfJar'
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            artifact jar
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/mcmodsrepo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.withType(JavaExec).configureEach {
    standardInput = System.in
}

// 外部モジュールからのアクセス拒否を headless で検証するテストタスク。
// server run を ft.probe.selftest 付きで起動し、プローブ(FtAccessProbe)が FMLCommonSetup で検証、
// 結果ファイル(PASS/FAIL)を書いて自己終了する。合否は結果ファイルで判定する（終了コードは既知の
// 起動時クラッシュとも1になり区別できないため）。
if (ftProbeSelfTest) {
    // このテスト起動時のみ runServer の挙動を調整（通常の runServer には影響しない）。
    // runServer は ForgeGradle が projectsEvaluated で生成するため、遅延マッチで設定する。
    tasks.matching { it.name == 'runServer' }.configureEach {
        ignoreExitValue = true                       // プローブの exit や起動クラッシュ自体では失敗させず、結果ファイルで判定
        doFirst { delete ftProbeResultFile }         // 前回結果を消し、走ったか否かを確実に判定
    }
}
tasks.register('accessDenialTest') {
    group = 'verification'
    description = '外部モジュールからのアクセス拒否をheadlessで検証し、LEAK検出時にビルドを失敗させる'
    dependsOn 'runServer'
    doLast {
        if (!ftProbeResultFile.exists()) {
            throw new GradleException('プローブが結果を書く前に終了しました（既知の間欠的な起動時クラッシュの可能性）。再実行してください: ' + ftProbeResultFile)
        }
        def verdict = ftProbeResultFile.text.trim()
        logger.lifecycle('[accessDenialTest] ' + verdict)
        if (verdict.startsWith('FAIL')) {throw new GradleException('外部モジュールアクセス拒否テスト失敗（LEAK検出）: ' + verdict)
        }
        logger.lifecycle('[accessDenialTest] 外部モジュールアクセス拒否テスト成功（LEAKなし）')
    }
}